name: Build 364 - Multi-Position + Symbol Filtering

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/build-364.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: wrapper
        cache-read-only: false
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build with Gradle
      id: gradle-build
      continue-on-error: true
      run: |
        echo "Starting Gradle build for BUILD #364..."
        echo "New features:"
        echo "  - Multi-position decision engine"
        echo "  - Symbol categorization (9 categories)"
        echo "  - Stable-to-stable filtering"
        echo "  - De-peg detector"
        echo ""
        ./gradlew assembleDebug --stacktrace --info > build-output.txt 2>&1
        BUILD_EXIT_CODE=$?
        echo "Build exit code: $BUILD_EXIT_CODE"
        exit $BUILD_EXIT_CODE
        
    - name: Count errors
      if: always()
      run: |
        echo "Analyzing build output..."
        if [ -f build-output.txt ]; then
          ERROR_COUNT=$(grep -c "^e:" build-output.txt || echo "0")
          WARNING_COUNT=$(grep -c "^w:" build-output.txt || echo "0")
          echo "Errors found: $ERROR_COUNT"
          echo "Warnings found: $WARNING_COUNT"
          
          if [ "$ERROR_COUNT" -gt 0 ]; then
            echo ""
            echo "=== COMPILATION ERRORS ==="
            grep "^e:" build-output.txt | head -50
            echo ""
            echo "=== CONTEXT AROUND FIRST ERROR ==="
            grep -A 10 "^e:" build-output.txt | head -30
          fi
        else
          echo "No build output file found"
        fi
        
    - name: Upload build output
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-364-output
        path: build-output.txt
        retention-days: 5
        
    - name: Upload APK on success
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: sovereign-vantage-build-364
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        
    - name: Build summary
      if: always()
      run: |
        echo "## BUILD #364 Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Features Added:**" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Multi-position decision engine (254 lines)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Symbol categorization system (343 lines)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Stable-to-stable filtering" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ De-peg detector (auto-enable >2%)" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Settings persistence" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ TradingCoordinator integration" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f build-output.txt ]; then
          ERROR_COUNT=$(grep -c "^e:" build-output.txt || echo "0")
          if [ "$ERROR_COUNT" -eq 0 ]; then
            echo "**Status:** ✅ SUCCESS - No compilation errors" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** ❌ FAILED - $ERROR_COUNT compilation errors" >> $GITHUB_STEP_SUMMARY
          fi
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Files Changed:** 4 (3 new, 2 modified)" >> $GITHUB_STEP_SUMMARY
        echo "**Lines Added:** 859" >> $GITHUB_STEP_SUMMARY
        echo "**Commit:** 8b4bdc8" >> $GITHUB_STEP_SUMMARY
