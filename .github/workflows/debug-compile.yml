# .github/workflows/debug-compile.yml
#
# SOVEREIGN VANTAGE V5.6.1 "ARTHUR EDITION"
# Debug Compile Workflow — Maximum Diagnostic Output
#
# © 2025-2026 MiWealth Pty Ltd
# Creator & Founder: Mike Stahl
# Co-Founder & CTO (In Memoriam): Arthur Iain McManus (1966-2025)
#
# PURPOSE: First compile pass — captures every error with full context
# so we can triage and batch-fix efficiently.
#
# USAGE: Push to any branch, or run manually from Actions tab.

name: "SV Debug Compile"

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]
  workflow_dispatch:  # Manual trigger from GitHub Actions tab

jobs:
  debug-compile:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Opt into Node.js 24 to address deprecation warning (required by June 2nd, 2026)
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      # ════════════════════════════════════════════════════════
      # 1. CHECKOUT
      # ════════════════════════════════════════════════════════
      - name: "Checkout code"
        uses: actions/checkout@v4

      # ════════════════════════════════════════════════════════
      # 2. JDK SETUP (must match build.gradle.kts jvmTarget)
      # ════════════════════════════════════════════════════════
      - name: "Set up JDK 17"
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ════════════════════════════════════════════════════════
      # 3. GRADLE CACHE (faster re-runs)
      # ════════════════════════════════════════════════════════
      - name: "Cache Gradle"
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ════════════════════════════════════════════════════════
      # 4. ANDROID SDK
      # ════════════════════════════════════════════════════════
      - name: "Set up Android SDK"
        uses: android-actions/setup-android@v3

      - name: "Accept SDK licenses"
        run: yes | sdkmanager --licenses || true

      - name: "Install SDK components"
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # ════════════════════════════════════════════════════════
      # 5. PRE-FLIGHT: Project structure audit
      # ════════════════════════════════════════════════════════
      - name: "📋 Project structure audit"
        run: |
          echo "══════════════════════════════════════════════"
          echo "  SOVEREIGN VANTAGE V5.6.1 — PROJECT AUDIT"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "=== Kotlin files ==="
          find . -name "*.kt" | wc -l
          echo ""
          echo "=== Lines of Kotlin ==="
          find . -name "*.kt" -exec cat {} + | wc -l
          echo ""
          echo "=== Package structure ==="
          find . -name "*.kt" -printf '%h\n' | sort -u | sed 's|./app/src/main/java/||'
          echo ""
          echo "=== Build files ==="
          find . -name "*.gradle*" -o -name "gradle-wrapper.properties" | sort
          echo ""
          echo "=== Resource files ==="
          find . -name "*.xml" -path "*/res/*" | wc -l

      # ════════════════════════════════════════════════════════
      # 6. PHASE 1: Dependency resolution (catches missing deps)
      # ════════════════════════════════════════════════════════
      - name: "🔗 Phase 1 — Resolve dependencies"
        run: |
          echo "══════════════════════════════════════════════"
          echo "  PHASE 1: DEPENDENCY RESOLUTION"
          echo "══════════════════════════════════════════════"
          chmod +x gradlew
          ./gradlew :app:dependencies --configuration debugCompileClasspath 2>&1 | tee deps-output.txt
        continue-on-error: true

      # ════════════════════════════════════════════════════════
      # 7. PHASE 2: KSP code generation (Hilt, Room)
      # ════════════════════════════════════════════════════════
      - name: "⚙️ Phase 2 — KSP/Annotation processing"
        run: |
          echo "══════════════════════════════════════════════"
          echo "  PHASE 2: KSP CODE GENERATION (Hilt, Room)"
          echo "══════════════════════════════════════════════"
          ./gradlew kspDebugKotlin 2>&1 | tee ksp-output.txt
        continue-on-error: true

      # ════════════════════════════════════════════════════════
      # 8. PHASE 3: Full Kotlin compile (the main event)
      #    --info gives detailed task output
      #    -Pkotlin.daemon.jvmargs adds heap for 265 files
      # ════════════════════════════════════════════════════════
      - name: "🔨 Phase 3 — Kotlin compile (full diagnostics)"
        run: |
          echo "══════════════════════════════════════════════"
          echo "  PHASE 3: KOTLIN COMPILATION"
          echo "  265 files, ~114,500 lines"
          echo "══════════════════════════════════════════════"
          ./gradlew compileDebugKotlin \
            --info \
            --stacktrace \
            -Pkotlin.daemon.jvmargs="-Xmx4g" \
            2>&1 | tee compile-output.txt
        continue-on-error: true

      # ════════════════════════════════════════════════════════
      # 9. PHASE 4: Full debug build (resource merging, dex)
      # ════════════════════════════════════════════════════════
      - name: "📦 Phase 4 — Full debug APK build"
        run: |
          echo "══════════════════════════════════════════════"
          echo "  PHASE 4: FULL APK BUILD"
          echo "══════════════════════════════════════════════"
          ./gradlew assembleDebug \
            --info \
            --stacktrace \
            2>&1 | tee build-output.txt
        continue-on-error: true

      # ════════════════════════════════════════════════════════
      # 10. ERROR EXTRACTION — structured summary
      # ════════════════════════════════════════════════════════
      - name: "🔍 Extract and categorise errors"
        if: always()
        run: |
          echo "══════════════════════════════════════════════════════"
          echo "  ERROR SUMMARY — SOVEREIGN VANTAGE V5.6.1"
          echo "══════════════════════════════════════════════════════"
          echo ""

          # ── Dependency errors ──
          echo "━━━ DEPENDENCY ERRORS ━━━"
          grep -i "Could not resolve\|Could not find\|Failed to" deps-output.txt 2>/dev/null | sort -u || echo "(none)"
          echo ""

          # ── KSP / annotation errors ──
          echo "━━━ KSP / ANNOTATION PROCESSING ERRORS ━━━"
          grep -E "^e:|error:|FAILED" ksp-output.txt 2>/dev/null | sort -u || echo "(none)"
          echo ""

          # ── Kotlin compile errors (grouped by file) ──
          echo "━━━ KOTLIN COMPILE ERRORS ━━━"
          grep -E "^e:" compile-output.txt 2>/dev/null | sort -u || echo "(none)"
          echo ""

          # ── Kotlin compile warnings ──
          echo "━━━ KOTLIN COMPILE WARNINGS (review, not blockers) ━━━"
          grep -E "^w:" compile-output.txt 2>/dev/null | sort -u | head -50 || echo "(none)"
          echo ""

          # ── Unresolved references (most common in our codebase) ──
          echo "━━━ UNRESOLVED REFERENCES ━━━"
          grep -oP "Unresolved reference: \K\w+" compile-output.txt 2>/dev/null | sort | uniq -c | sort -rn || echo "(none)"
          echo ""

          # ── Type mismatches ──
          echo "━━━ TYPE MISMATCHES ━━━"
          grep "Type mismatch" compile-output.txt 2>/dev/null | sort -u || echo "(none)"
          echo ""

          # ── Missing imports (files that need them) ──
          echo "━━━ FILES WITH ERRORS (by count) ━━━"
          grep -oP "^e: file://[^:]+:\K[^:]+" compile-output.txt 2>/dev/null | sort | uniq -c | sort -rn | head -20 || echo "(none)"
          echo ""

          # ── Build result ──
          echo "━━━ BUILD RESULT ━━━"
          APK=$(find app/build/outputs/apk/debug/ -name "*.apk" 2>/dev/null | head -1)
          if [ -n "$APK" ]; then
            echo "✅ APK BUILT SUCCESSFULLY"
            ls -lh "$APK"
          else
            echo "❌ APK NOT BUILT — see errors above"
          fi
          echo ""

          # ── Error count summary ──
          echo "━━━ TOTALS ━━━"
          echo "Errors:   $(grep -c "^e:" compile-output.txt 2>/dev/null || echo 0)"
          echo "Warnings: $(grep -c "^w:" compile-output.txt 2>/dev/null || echo 0)"

      # ════════════════════════════════════════════════════════
      # 11. UPLOAD ALL LOGS AS ARTIFACTS
      # ════════════════════════════════════════════════════════
      # BUILD #167: Re-enabled after storage cleanup (177 runs deleted)
      - name: "📤 Upload build logs"
        if: always()
        continue-on-error: true  # Don't fail CI if storage quota hit
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.sha }}
          path: |
            deps-output.txt
            ksp-output.txt
            compile-output.txt
            build-output.txt
          retention-days: 7

      # ════════════════════════════════════════════════════════
      # 12. UPLOAD APK (if build produced one)
      # ════════════════════════════════════════════════════════
      # BUILD #167: Re-enabled after storage cleanup (177 runs deleted)
      - name: "📤 Upload debug APK"
        if: always()
        continue-on-error: true  # Don't fail CI if storage quota hit
        uses: actions/upload-artifact@v4
        with:
          name: SovereignVantage-APK
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn
          retention-days: 7
